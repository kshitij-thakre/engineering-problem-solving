name: Sync LeetHub Commits To Google Sheet

on:
  push:
    branches:
      - main  # Change this to 'master' if your LeetHub repo uses master instead of main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Extract Problem Name and Push Payload
        run: |
          # Detect the directory added or modified in the latest commit
          CHANGED_DIR=$(git diff-tree --no-commit-id --name-only -r HEAD | head -n 1 | cut -d '/' -f1)
          
          # Clean folder name (e.g., "0001-two-sum" -> "Two Sum")
          CLEAN_NAME=$(echo "$CHANGED_DIR" | sed -E 's/^[0-9]+-//' | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
          
          FILE_PATH=$(git diff-tree --no-commit-id --name-only -r HEAD | head -n 1)
          FULL_URL="https://github.com/${{ github.repository }}/blob/main/$FILE_PATH"
          
          if [ ! -z "$CLEAN_NAME" ] && [ "$CHANGED_DIR" != ".github" ]; then
            echo "Syncing problem: $CLEAN_NAME"
            curl -L -X POST "${{ secrets.GOOGLE_WEBAPP_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"problemName\":\"$CLEAN_NAME\", \"githubLink\":\"$FULL_URL\"}"
          fi
