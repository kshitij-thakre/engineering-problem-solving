name: Sync LeetHub Commits To Google Sheet

on:
  push:
    branches:
      - main  # Adjust to 'master' if your default LeetHub branch is master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1  # No depth dependency needed anymore

      - name: Extract Latest LeetHub Folder and Push Payload
        env:
          GOOGLE_WEBAPP_URL: ${{ secrets.GOOGLE_WEBAPP_URL }}
        run: |
          # 1. Find the most recently modified file in the repository (excluding system files)
          FILE_PATH=$(find . -not -path '*/.*' -type f -exec stat -c '%Y %p' {} + | sort -n | tail -n 1 | cut -d' ' -f2- | sed 's|^\./||')
          echo "Most recently touched file: $FILE_PATH"
          
          # 2. Extract the main problem directory name
          CHANGED_DIR=$(echo "$FILE_PATH" | cut -d '/' -f1)
          echo "Target problem directory: $CHANGED_DIR"
          
          # Guard clause: stop if it's empty or pointing to systemic directories
          if [ -z "$CHANGED_DIR" ] || [ "$CHANGED_DIR" = ".github" ] || [ "$CHANGED_DIR" = "README.md" ]; then
            echo "No valid algorithmic directory found. Skipping update."
            exit 0
          fi
          
          # 3. Format the problem directory (e.g., "0001-two-sum" -> "Two Sum")
          CLEAN_NAME=$(echo "$CHANGED_DIR" | sed -E 's/^[0-9]+-//' | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
          echo "Cleaned problem name for Google Sheets: $CLEAN_NAME"
          
          # 4. Create the final destination link
          FULL_URL="https://github.com/${{ github.repository }}/blob/main/$FILE_PATH"
          
          # 5. Send payload safely to Google Apps Script
          echo "Sending payload..."
          curl -L -X POST "$GOOGLE_WEBAPP_URL" \
            -H "Content-Type: application/json" \
            -d "{\"problemName\":\"$CLEAN_NAME\", \"githubLink\":\"$FULL_URL\"}"
